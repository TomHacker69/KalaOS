services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kalaos-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      # Set a stable secret so session tokens survive restarts.
      # Generate one with: python -c "import secrets; print(secrets.token_hex(32))"
      - KALA_SECRET=${KALA_SECRET:-change-me-in-production}
      # Restrict CORS to your frontend origin in production, e.g.:
      # - KALA_CORS_ORIGINS=https://studio.example.com
      - KALA_CORS_ORIGINS=${KALA_CORS_ORIGINS:-*}
      # Optional: set KALA_SMTP_HOST and friends to enable email delivery
      # - KALA_SMTP_HOST=smtp.sendgrid.net
      # - KALA_SMTP_PORT=587
      # - KALA_SMTP_USER=apikey
      # - KALA_SMTP_PASS=your-sendgrid-api-key
      # - KALA_SMTP_FROM=noreply@example.com
      # - KALA_APP_URL=https://studio.example.com
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: kalaos-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kalaos-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: kalaos-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-kalaos}
      - POSTGRES_USER=${POSTGRES_USER:-kalaos}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kalaos-dev-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ollama_data:
  redis_data:
  postgres_data:
